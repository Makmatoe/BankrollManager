name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version or build label, for example v0.1.0"
        required: true
        default: "v0.1.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build Release
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Verify
        shell: pwsh
        run: .\scripts\verify.ps1 -Configuration Release -ArtifactsPath .\.verify\release-test

      - name: Publish package
        id: publish
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PFX_BASE64 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
          SIGNING_TIMESTAMP_URL: ${{ secrets.WINDOWS_SIGNING_TIMESTAMP_URL }}
        run: |
          $version = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          }

          $hasSigningCertificate = ![string]::IsNullOrWhiteSpace($env:SIGNING_CERTIFICATE_PFX_BASE64)
          $hasSigningPassword = ![string]::IsNullOrWhiteSpace($env:SIGNING_CERTIFICATE_PASSWORD)
          if ($hasSigningCertificate -xor $hasSigningPassword) {
            throw "Set both WINDOWS_SIGNING_CERTIFICATE_PFX_BASE64 and WINDOWS_SIGNING_CERTIFICATE_PASSWORD, or leave both unset for an unsigned build."
          }

          $signParams = ""
          $certificatePath = $null
          try {
            if ($hasSigningCertificate) {
              $certificatePath = Join-Path $env:RUNNER_TEMP "bankroll-manager-signing.pfx"
              [System.IO.File]::WriteAllBytes(
                $certificatePath,
                [System.Convert]::FromBase64String($env:SIGNING_CERTIFICATE_PFX_BASE64))

              $securePassword = ConvertTo-SecureString -String $env:SIGNING_CERTIFICATE_PASSWORD -AsPlainText -Force
              $certificate = Import-PfxCertificate `
                -FilePath $certificatePath `
                -CertStoreLocation Cert:\CurrentUser\My `
                -Password $securePassword

              $thumbprint = @($certificate)[0].Thumbprint
              if ([string]::IsNullOrWhiteSpace($thumbprint)) {
                throw "Could not import the signing certificate."
              }

              $timestampUrl = if (![string]::IsNullOrWhiteSpace($env:SIGNING_TIMESTAMP_URL)) {
                $env:SIGNING_TIMESTAMP_URL
              }
              else {
                "http://timestamp.digicert.com"
              }

              $signParams = "/sha1 $thumbprint /s My /fd SHA256 /tr `"$timestampUrl`" /td SHA256"
              Write-Host "Code signing enabled for this release."
            }
            else {
              Write-Host "Code signing secrets are not configured; building unsigned release assets."
            }

            if (![string]::IsNullOrWhiteSpace($signParams)) {
              .\scripts\publish.ps1 `
                -Configuration Release `
                -Runtime win-x64 `
                -Version $version `
                -SignParams $signParams
            }
            else {
              .\scripts\publish.ps1 `
                -Configuration Release `
                -Runtime win-x64 `
                -Version $version
            }
          }
          finally {
            if (![string]::IsNullOrWhiteSpace($certificatePath) -and (Test-Path -LiteralPath $certificatePath)) {
              Remove-Item -LiteralPath $certificatePath -Force
            }
          }

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.publish.outputs.artifact_name }}-velopack
          path: ${{ steps.publish.outputs.velopack_assets }}
          if-no-files-found: error

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ github.ref_name }}
          RELEASE_DIR: ${{ steps.publish.outputs.velopack_dir }}
        run: |
          dotnet tool restore
          dotnet tool run vpk -- upload github `
            --outputDir $env:RELEASE_DIR `
            --repoUrl "https://github.com/$env:GITHUB_REPOSITORY" `
            --token $env:GH_TOKEN `
            --publish true `
            --merge true `
            --releaseName $env:RELEASE_VERSION `
            --tag $env:RELEASE_VERSION
